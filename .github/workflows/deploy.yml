name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_BUSINESS_NAME: Geethika Digital World
          VITE_BUSINESS_EMAIL: geethikaphotoplanet9@gmail.com
          VITE_BUSINESS_PHONE: "919492686421"
          VITE_WHATSAPP_NUMBER: "919492686421"

      - name: Deploy dist to Hostinger via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: ${{ secrets.SSH_TARGET_PATH }}
          strip_components: 2
          timeout: 120s
          command_timeout: 30m

      - name: Deploy backend files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/config/whatsapp.js,backend/routes/orders.js,backend/server.js"
          target: /home/u327292494/domains/geethikadigitalworld.com/nodejs
          strip_components: 1
          timeout: 120s
          command_timeout: 30m

      - name: Write .env and restart Node app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > ~/domains/geethikadigitalworld.com/nodejs/.env << 'ENVEOF'
            PORT=5000
            NODE_ENV=production
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            FRONTEND_URL=https://geethikadigitalworld.com
            BACKEND_URL=https://geethikadigitalworld.com
            FRONTEND_PATH=/home/u327292494/domains/geethikadigitalworld.com/public_html
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            WHATSAPP_NUMBER=919492686421
            WHATSAPP_VERIFY_TOKEN=geethika_verify_token
            CHATMITRA_API_KEY=${{ secrets.CHATMITRA_API_KEY }}
            BUSINESS_NAME=Geethika Digital World
            BUSINESS_EMAIL=geethikaphotoplanet9@gmail.com
            BUSINESS_PHONE=919492686421
            ADMIN_EMAIL=admin@geethikadigitalworld.com
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ENABLE_TEST_PAYMENTS=true
            ENVEOF
            touch ~/domains/geethikadigitalworld.com/nodejs/tmp/restart.txt
            echo "Deployed and restarted successfully"
