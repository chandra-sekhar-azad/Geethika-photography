name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_BUSINESS_NAME: Geethika Digital World
          VITE_BUSINESS_EMAIL: geethikaphotoplanet9@gmail.com
          VITE_BUSINESS_PHONE: "919492686421"
          VITE_WHATSAPP_NUMBER: "919492686421"

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Test SSH connectivity
        run: |
          echo "Testing SSH connection to ${{ secrets.SSH_HOST }} on port ${{ secrets.SSH_PORT }}"
          nc -zv -w 10 ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }} && echo "Port is open" || echo "Port is closed/blocked"
        continue-on-error: true

      - name: Deploy frontend via sshpass + rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
            -e "ssh -4 -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=10" \
            frontend/dist/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u327292494/domains/geethikadigitalworld.com/nodejs/public/

      - name: Deploy backend files via sshpass + rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz \
            -e "ssh -4 -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o ConnectTimeout=60 -o ServerAliveInterval=10" \
            backend/server.js \
            backend/config/ \
            backend/middleware/ \
            backend/models/ \
            backend/routes/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u327292494/domains/geethikadigitalworld.com/nodejs/
        continue-on-error: true

      - name: Write .env and restart Node app
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -4 \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=10 \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "printf '%s' '${{ secrets.BACKEND_ENV_FILE }}' > ~/domains/geethikadigitalworld.com/nodejs/.env && mkdir -p ~/domains/geethikadigitalworld.com/nodejs/tmp && touch ~/domains/geethikadigitalworld.com/nodejs/tmp/restart.txt && echo Done"
        continue-on-error: true
