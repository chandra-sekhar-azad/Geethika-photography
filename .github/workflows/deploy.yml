name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          VITE_BUSINESS_NAME: Geethika Digital World
          VITE_BUSINESS_EMAIL: geethikaphotoplanet9@gmail.com
          VITE_BUSINESS_PHONE: "919492686421"
          VITE_WHATSAPP_NUMBER: "919492686421"

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy frontend via lftp
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_HOST }}" <<EOF
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 3
          mkdir -p /domains/geethikadigitalworld.com/nodejs/public
          mirror -R --delete --no-perms frontend/dist/ /domains/geethikadigitalworld.com/nodejs/public/
          quit
          EOF

      - name: Deploy backend via lftp
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_HOST }}" <<EOF
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 3
          mirror -R --no-perms --exclude node_modules/ --exclude .env --exclude uploads/ backend/ /domains/geethikadigitalworld.com/nodejs/
          quit
          EOF
        continue-on-error: true
